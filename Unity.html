<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity作品</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h1>Unity作品</h1>
  <p class="sub">アバター改変（スタイル統一・最適化）</p>
</header>

<main class="main unity">

  <!-- 説明 -->
  <section class="intro">
    <p>
      異なるアバターに対して色味・質感・バランスの調整に加え、
      テクスチャ解像度やマテリアル設定の最適化を行い、
      見た目とパフォーマンスの両立を意識したカスタマイズを行っています。
    </p>
  </section>

  <!-- ① -->
  <section class="compare">
    <div class="compare__item">
      <img src="img/avatar1_before.png" alt="Before">
      <p>Before</p>
    </div>
    <div class="compare__item">
      <img src="img/avatar1_after.png" alt="After">
      <p>After</p>
    </div>
  </section>

  <p class="unity-desc">
    テクスチャ解像度を4Kから2Kへ最適化し、視覚品質を維持したまま描画負荷を軽減。
  </p>

  <!-- ② -->
  <section class="compare">
    <div class="compare__item">
      <img src="img/avatar2_before.png" alt="Before">
      <p>Before</p>
    </div>
    <div class="compare__item">
      <img src="img/avatar2_after.png" alt="After">
      <p>After</p>
    </div>
  </section>

  <p class="unity-desc">
    明るさとコントラストを調整しつつ、不要な要素を整理して軽量化。
  </p>

  <!-- ③ -->
  <section class="compare">
    <div class="compare__item">
      <img src="img/avatar3_before.png" alt="Before">
      <p>Before</p>
    </div>
    <div class="compare__item">
      <img src="img/avatar3_after.png" alt="After">
      <p>After</p>
    </div>
  </section>

  <p class="unity-desc">
    色バランスと質感を調整しながら、マテリアル設定を見直してパフォーマンスを改善。
  </p>

  <!-- 戻る -->
  <div class="back">
    <a href="index.html">← ポートフォリオに戻る</a>
  </div>

</main>

</body>
</html>
